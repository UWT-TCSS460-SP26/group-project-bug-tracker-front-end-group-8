  # ── Community ─────────────────────────────────────────────────

  /v1/community/top-rated/movie:
    get:
      tags: [Community]
      summary: Community top-rated movies
      description: |
        Returns the highest-rated movies by community average score,
        filtered to titles that have at least `minCount` ratings (default 3) to
        prevent single-vote outliers from dominating the list.

        Each result is enriched with a `summary` field containing that movie's 
        metadata or `null` if no metadata exists. 

        **Caching:** results are cached in memory for 5 minutes per unique
        `(limit, minCount)` combination. The response includes `cached: true`
        and `cacheTtlSeconds: 300` when a cached result is served.
      parameters:
        - in: query
          name: limit
          description: Number of results to return
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - in: query
          name: minCount
          description: Minimum number of ratings a title must have to appear in the list
          schema: { type: integer, minimum: 1, default: 3 }
      responses:
        '200':
          description: Top-rated movies enriched with movie metadata
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        mediaId: { type: integer, example: 550 }
                        avgScore: { type: number, format: float, example: 8.7 }
                        ratingCount: { type: integer, example: 42 }
                        summary:
                          allOf:
                            - $ref: '#/components/schemas/MovieSummary'
                          nullable: true
                  cached: { type: boolean, example: false }
                  cacheTtlSeconds: { type: integer, example: 300 }
        '400':
          description: Validation failed (non-numeric limit or minCount)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              examples:
                nonNumeric:
                  summary: Non-numeric parameter
                  value:
                    error: 'Parameters "limit" and "minCount" must be numeric'
        '500':
          description: Database or TMDB error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /v1/community/top-rated/tv:
    get:
      tags: [Community]
      summary: Community top-rated TV series
      description: |
        Returns the highest-rated TV series by community average score,
        filtered to titles that have at least `minCount` ratings (default 3) to
        prevent single-vote outliers from dominating the list.

        Each result is enriched with a `summary` field containing that series's 
        metadata or `null` if no metadata exists. 

        **Caching:** results are cached in memory for 5 minutes per unique
        `(limit, minCount)` combination. The response includes `cached: true`
        and `cacheTtlSeconds: 300` when a cached result is served.
      parameters:
        - in: query
          name: limit
          description: Number of results to return
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - in: query
          name: minCount
          description: Minimum number of ratings a title must have to appear in the list
          schema: { type: integer, minimum: 1, default: 3 }
      responses:
        '200':
          description: Top-rated TV series enriched with  series metadata
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        mediaId: { type: integer, example: 1396 }
                        avgScore: { type: number, format: float, example: 8.7 }
                        ratingCount: { type: integer, example: 42 }
                        summary:
                          allOf:
                            - $ref: '#/components/schemas/TvSeriesSummary'
                          nullable: true
                  cached: { type: boolean, example: false }
                  cacheTtlSeconds: { type: integer, example: 300 }
        '400':
          description: Validation failed (non-numeric limit or minCount)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              examples:
                nonNumeric:
                  summary: Non-numeric parameter
                  value:
                    error: 'Parameters "limit" and "minCount" must be numeric'
        '500':
          description: Database or TMDB error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /v1/community/{id}:
    get:
      tags: [Community]
      summary: Movie or TV details
      description: |
        Returns details for a movie or TV show combined with community
        data — aggregate rating and paginated recent reviews — in a single
        response.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, minimum: 1 }
          example: 550
        - name: type
          in: query
          required: true
          schema: { type: string, enum: [movie, tv] }
          example: movie
        - name: page
          in: query
          schema: { type: integer, minimum: 1, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 25 }
        - name: sort
          in: query
          schema: { type: string, enum: [createdAt, id], default: createdAt }
        - name: order
          in: query
          schema: { type: string, enum: [asc, desc], default: desc }
      responses:
        '200':
          description: Details merged with community ratings and reviews
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    description: Details for the movie or show with community ratings and reviews
                    properties:
                      mediaId: { type: integer, example: 550 }
                      avgScore:
                        type: number
                        format: float
                        nullable: true
                        description: Average community score (1.0–10.0); null when no ratings exist.
                        example: 7.4
                      totalRatings: { type: integer, example: 42 }
                      summary:
                        oneOf:
                          - $ref: '#/components/schemas/MovieSummary'
                          - $ref: '#/components/schemas/TvSeriesSummary'
                      reviews:
                        type: object
                        properties:
                          data:
                            type: array
                            items:
                              type: object
                              properties:
                                id: { type: integer }
                                username: { type: string }
                                title: { type: string, nullable: true }
                                body: { type: string }
                                createdAt: { type: string, format: date-time }
                                author: { $ref: '#/components/schemas/Author' }
                          pagination:
                            type: object
                            properties:
                              page: { type: integer, example: 1 }
                              limit: { type: integer, example: 25 }
                              total: { type: integer, example: 3 }
                              totalPages: { type: integer, example: 1 }
        '400':
          description: Invalid id or missing/invalid type parameter
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '404':
          description: Movie or TV show not found in TMDB
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              example:
                error: Title not found
        '500':
          description: TMDB or database error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              example:
                error: Failed to fetch details

  # ── Issues ────────────────────────────────────────────────────

  /v1/issues:
    post:
      tags: [Issues]
      summary: File a public bug report
      description: |
        Public submission route — anyone with the URL can file a bug report.
        No authentication required. Returns a small confirmation payload on
        success.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/IssueInput' }
            examples:
              minimal:
                summary: Required fields only
                value:
                  title: 'Search returns 500 on long titles'
                  description: 'Calling /v1/movie/search?title=<300 chars> returns 500.'
              full:
                summary: With reproduction steps and reporter contact
                value:
                  title: 'Poster URLs are 404'
                  description: 'Some movies return TMDB poster paths that 404.'
                  reproSteps: 'GET /v1/movie/details/9999, click posterUrl'
                  reporterEmail: 'qa@example.com'
      responses:
        '201':
          description: Issue accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/IssueAck' }
        '400':
          description: Validation failed
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              example:
                error: Validation failed
        '500':
          description: Failed to file issue
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              example:
                error: Failed to file issue

    get:
      tags: [Issues]
      summary: List all bug reports (admin)
      description: |
        Admin-gated paginated list of all bug reports. Optionally filter by
        `status`. Results are sorted by `createdAt` descending by default
        (newest first).

        **Role required:** Admin or above (Admin, SuperAdmin, Owner).

        **Pagination:** defaults to page 1, 25 per page, max 100 per page.

        **Filtering:** pass a single `status` value to narrow results.
        Omit `status` to return all reports regardless of state.

        **Sort:** only `createdAt` is supported; direction is controlled
        by `order`.
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [open, in_progress, resolved, closed]
          description: Filter by triage status. Omit to return all.
          example: open
        - name: page
          in: query
          schema: { type: integer, minimum: 1, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 25 }
        - name: order
          in: query
          schema: { type: string, enum: [asc, desc], default: desc }
          description: Sort direction for createdAt. desc = newest first.
      responses:
        '200':
          description: Paginated list of bug reports
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/IssueSummary' }
                  pagination:
                    type: object
                    properties:
                      total: { type: integer, example: 38 }
                      page: { type: integer, example: 1 }
                      limit: { type: integer, example: 25 }
                      totalPages: { type: integer, example: 2 }
              example:
                data:
                  - id: 7
                    title: 'Search returns 500 on long titles'
                    status: open
                    reporterEmail: 'qa@example.com'
                    createdAt: '2026-05-03T00:00:00.000Z'
                    updatedAt: '2026-05-03T00:00:00.000Z'
                pagination:
                  total: 38
                  page: 1
                  limit: 25
                  totalPages: 2
        '400':
          description: Invalid query parameter
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              examples:
                invalidStatus:
                  summary: Unknown status value
                  value: { error: 'Validation failed' }
                limitTooHigh:
                  summary: limit exceeds max
                  value: { error: 'Validation failed' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500':
          description: Database error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              example: { error: 'Failed to retrieve issues' }

  /v1/issues/{id}:
    get:
      tags: [Issues]
      summary: Get a single bug report (admin)
      description: |
        Returns the full detail record for a single bug report.

        **Role required:** Admin or above.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, minimum: 1 }
          example: 7
      responses:
        '200':
          description: Full issue detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Issue' }
              example:
                data:
                  id: 7
                  title: 'Search returns 500 on long titles'
                  description: 'Calling /v1/movie/search?title=<300 chars> returns 500.'
                  reproSteps: null
                  reporterEmail: 'qa@example.com'
                  reporterUserId: null
                  status: open
                  createdAt: '2026-05-03T00:00:00.000Z'
                  updatedAt: '2026-05-03T00:00:00.000Z'
        '400':
          description: Non-numeric id
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              example: { error: 'Parameter "id" must be a positive integer' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404':
          description: Issue not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              example: { error: 'Issue not found' }
        '500':
          description: Database error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              example: { error: 'Failed to retrieve issue' }

    patch:
      tags: [Issues]
      summary: Triage a bug report (admin)
      description: |
        Partially update a bug report's triage status. Only the `status`
        field is accepted — send exactly one field. The valid workflow
        transitions are:

        `open` → `in_progress` → `resolved` or `closed`

        Any transition between valid statuses is accepted; the API does not
        enforce ordering. A body with an unknown status string returns `400`.

        **Semantics:** PATCH (partial update) — only `status` is accepted.
        Sending additional fields is harmless; they are stripped by the
        validator before reaching the controller.

        **Role required:** Admin or above.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, minimum: 1 }
          example: 7
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [open, in_progress, resolved, closed]
                  example: in_progress
            examples:
              triage:
                summary: Move to in_progress
                value: { status: in_progress }
              resolve:
                summary: Mark resolved
                value: { status: resolved }
              close:
                summary: Close as wontfix
                value: { status: closed }
      responses:
        '200':
          description: Updated issue confirmation
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id: { type: integer, example: 7 }
                      title: { type: string, example: 'Search returns 500 on long titles' }
                      status:
                        type: string
                        enum: [open, in_progress, resolved, closed]
                        example: in_progress
                      updatedAt: { type: string, format: date-time }
              example:
                data:
                  id: 7
                  title: 'Search returns 500 on long titles'
                  status: in_progress
                  updatedAt: '2026-05-10T14:32:00.000Z'
        '400':
          description: Validation failed — missing or invalid status
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              examples:
                invalidStatus:
                  summary: Unknown status string
                  value: { error: 'Validation failed' }
                emptyBody:
                  summary: Empty body
                  value: { error: 'Validation failed' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404':
          description: Issue not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              example: { error: 'Issue not found' }
        '500':
          description: Database error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              example: { error: 'Failed to update issue' }

    delete:
      tags: [Issues]
      summary: Delete a bug report (admin)
      description: |
        Permanently remove a bug report. Intended for resolved reports or
        spam. Returns `204 No Content` on success — there is no response
        body.

        **Role required:** Admin or above.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, minimum: 1 }
          example: 7
      responses:
        '204':
          description: Issue deleted — no response body
        '400':
          description: Non-numeric id
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              example: { error: 'Parameter "id" must be a positive integer' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404':
          description: Issue not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              example: { error: 'Issue not found' }
        '500':
          description: Database error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              example: { error: 'Failed to delete issue' }

# ── Schemas ───────────────────────────────────────────────────

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        RS256 JWT issued by the shared **Auth²** service (issuer
        `https://tcss-460-iam.onrender.com`). Tokens are verified against
        the issuer's JWKS; the `aud` claim must equal this group's
        audience name (`group-8-api`). Pass the access token as
        `Authorization: Bearer <token>`. This API never mints tokens.
  schemas:
    PaginationInfo:
      type: object
      description: Pagination information
      properties:
        page:
          type: integer
          description: The current page
          example: 1
        totalResults:
          type: integer
          description: The total number of results available
          example: 12
        totalPages:
          type: integer
          description: The total number of pages available
          example: 2

    MovieSummary:
      type: object
      description: Simplified movie object
      properties:
        id:
          type: integer
          description: movie ID
          example: 27205
        title:
          type: string
          description: Movie title
          example: Inception
        synopsis:
          type: string
          description: Brief plot overview
          example: A thief who steals corporate secrets through dream-sharing technology.
        releaseDate:
          type: string
          format: date
          description: Theatrical release date (YYYY-MM-DD)
          example: '2010-07-16'
        posterUrl:
          type: string
          format: uri
          description: Full URL to the original-size poster image
          example: 'https://image.tmdb.org/t/p/original/9gk7adHYeDvHkCSEqAvQNLV5Uge.jpg'

    TvSeriesSummary:
      type: object
      description: Simplified TV series object
      properties:
        id:
          type: integer
          description: TV series ID
          example: 1396
        title:
          type: string
          description: Series name
          example: Breaking Bad
        synopsis:
          type: string
          description: Brief series overview
          example: A chemistry teacher diagnosed with cancer turns to manufacturing drugs.
        airDate:
          type: string
          format: date
          description: First air date (YYYY-MM-DD)
          example: '2008-01-20'
        posterUrl:
          type: string
          format: uri
          description: Full URL to the original-size poster image
          example: 'https://image.tmdb.org/t/p/original/ggFHVNu6YYI5L9pCfOacjizRGt.jpg'

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Human-readable error message
          example: 'An unexpected error occurred'

    IssueInput:
      type: object
      required: [title, description]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
          minLength: 1
          maxLength: 5000
        reproSteps:
          type: string
          maxLength: 5000
        reporterEmail:
          type: string
          format: email

    IssueAck:
      type: object
      properties:
        id: { type: integer, example: 42 }
        title: { type: string, example: 'Search returns 500' }
        status:
          type: string
          enum: [open, in_progress, resolved, closed]
          example: open
        createdAt: { type: string, format: date-time }

    IssueSummary:
      type: object
      description: Condensed issue shape returned by the admin list route
      properties:
        id: { type: integer, example: 7 }
        title: { type: string, example: 'Search returns 500 on long titles' }
        status:
          type: string
          enum: [open, in_progress, resolved, closed]
          example: open
        reporterEmail:
          type: string
          format: email
          nullable: true
          example: 'qa@example.com'
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    Issue:
      type: object
      description: Full issue record returned by the admin detail route
      properties:
        id: { type: integer, example: 7 }
        title: { type: string, example: 'Search returns 500 on long titles' }
        description:
          { type: string, example: 'Calling /v1/movie/search?title=<300 chars> returns 500.' }
        reproSteps:
          type: string
          nullable: true
          example: null
        reporterEmail:
          type: string
          format: email
          nullable: true
          example: 'qa@example.com'
        reporterUserId:
          type: integer
          nullable: true
          example: null
        status:
          type: string
          enum: [open, in_progress, resolved, closed]
          example: open
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    Author:
      type: object
      nullable: true
      description: |
        Stable identity attached to every review and rating response so a
        partner front-end can render a feed without a separate /users/:id
        round trip. `subjectId` is the Auth² `sub` claim; `id` is the local
        User row primary key; `displayName` falls back to "first last" then
        "Unknown User" when no username is set.
      required: [id, subjectId, displayName]
      properties:
        id: { type: integer, example: 42 }
        subjectId: { type: string, example: 'auth2|abc123' }
        displayName: { type: string, example: 'alice' }

    Review:
      type: object
      description: A user-submitted review of a movie or TV series
      properties:
        id: { type: integer, example: 1 }
        mediaId: { type: integer, example: 550 }
        mediaType: { type: string, enum: [movie, tv], example: movie }
        title: { type: string, nullable: true, example: 'Loved it' }
        body: { type: string, example: 'A modern classic' }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        author: { $ref: '#/components/schemas/Author' }

    PaginatedReviews:
      type: object
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/Review' }
        pagination:
          type: object
          properties:
            page: { type: integer, example: 1 }
            limit: { type: integer, example: 25 }
            total: { type: integer, example: 53 }
            totalPages: { type: integer, example: 3 }

    RatingSummary:
      type: object
      description: Aggregate rating data for a single title
      properties:
        mediaId: { type: integer, example: 550 }
        mediaType: { type: string, enum: [movie, tv], example: movie }
        average:
          type: number
          format: float
          nullable: true
          description: Average score (1.0–10.0); null when no ratings exist
          example: 7.5
        count: { type: integer, example: 4 }

    Rating:
      type: object
      description: A user-submitted numeric rating for a movie or TV series
      properties:
        id: { type: integer, example: 1 }
        mediaId: { type: integer, example: 550 }
        mediaType: { type: string, enum: [movie, tv], example: movie }
        score:
          type: number
          format: float
          minimum: 1
          maximum: 10
          example: 8.5
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        author: { $ref: '#/components/schemas/Author' }

    PaginatedRatings:
      type: object
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/Rating' }
        pagination:
          type: object
          properties:
            page: { type: integer, example: 1 }
            limit: { type: integer, example: 25 }
            total: { type: integer, example: 12 }
            totalPages: { type: integer, example: 1 }

  responses:
    BadRequest:
      description: Validation failed
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
          example: { error: 'Validation failed' }
    Unauthorized:
      description: Missing or invalid token
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
          example: { error: 'Invalid or missing token' }
    Forbidden:
      description: Authenticated, but caller is not permitted
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
          example: { error: 'Forbidden' }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
          example: { error: 'Not found' }
    InternalError:
      description: Server-side failure
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
          example: { error: 'Internal server error' }
