openapi: 3.0.3
info:
  title: TCSS 460 Group 8 API
  description: |
    **Team:** Group 8

    **Deployed URL:** https://tcss460-team-8-api.onrender.com/

    Welcome to version 1 of The Movie & Show Reviews Database API--a RESTful API for the TCSS 460 Group 8 project. This is where you will find the list of currently available methods for our movie and tv reviews API.

  version: 0.1.0

servers:
  - url: https://tcss460-team-8-api.onrender.com/
    description: Express API server hosted on Render

tags:
  - name: General
    description: General-purpose routes
  - name: Movies
    description: Movie proxy routes — search, details, and popular listings
  - name: TV Series
    description: TV series proxy routes — search, details, and popular listings
  - name: Reviews
    description: User-submitted reviews persisted via Prisma/Postgres
  - name: Ratings
    description: User-submitted scores and aggregate summaries
  - name: Community
    description: Public discovery routes — top-rated content and user history
  - name: Issues
    description: Bug reports. Anyone can submit a report; Admin or above can list, read, triage, and delete.

paths:
  # ── General ───────────────────────────────────────────────────

  /health:
    get:
      tags: [General]
      summary: Health check
      description: Heartbeat route that returns a fixed response confirming the API is alive.
      responses:
        '200':
          description: API is alive
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: alive

  # ── Movies ────────────────────────────────────────────────────

  /v1/movie/search:
    get:
      tags: [Movies]
      summary: Search movies by title
      description: |
        Searches for movies matching the given title. Results are transformed
        into a simplified `MovieSummary` shape.
      parameters:
        - name: title
          in: query
          required: true
          schema:
            type: string
          description: Movie title to search for
          example: Inception
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Page number for pagination. Defaults to 1.
          example: 1
      responses:
        '200':
          description: List of matching movies with pagination info
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/MovieSummary'
                  pagination:
                    $ref: '#/components/schemas/PaginationInfo'
              example:
                results:
                  - id: 27205
                    title: 'Inception'
                    synopsis: 'A thief who steals corporate secrets through dream-sharing technology.'
                    releaseDate: '2010-07-16'
                    posterUrl: 'https://image.tmdb.org/t/p/original/9gk7adHYeDvHkCSEqAvQNLV5Uge.jpg'
                pagination:
                  page: 1
                  totalResults: 12
                  totalPages: 2
        '400':
          description: Missing or invalid query parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingTitle:
                  summary: Missing title
                  value:
                    error: 'Parameter "title" is required (query param)'
        '500':
          description: API key is not configured or other server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingApiKey:
                  summary: Missing API Key
                  value:
                    error: API key is not configured
        '502':
          description: Failed to reach service
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                serviceDown:
                  summary: Service Unavailable
                  value:
                    error: Failed to reach service

  /v1/movie/details/{id}:
    get:
      tags: [Movies]
      summary: Get movie details
      description: |
        Returns detailed information for a single movie identified by its ID.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
          description: Movie ID (must be a positive integer)
          example: 27205
      responses:
        '200':
          description: Movie details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MovieSummary'
        '400':
          description: Missing or invalid ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingId:
                  summary: Missing ID
                  value:
                    error: 'Parameter "id" is required'
                invalidId:
                  summary: Non-numeric ID
                  value:
                    error: 'Parameter "id" must be a positive integer'
        '500':
          description: API key is not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingApiKey:
                  summary: Missing API Key
                  value:
                    error: API key is not configured
        '502':
          description: Failed to reach service
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                serviceDown:
                  summary: Service Unavailable
                  value:
                    error: Failed to reach service

  /v1/movie/popular:
    get:
      tags: [Movies]
      summary: Get popular movies
      description: |
        Returns the current list of popular movies, transformed into
        simplified `MovieSummary` objects with pagination info. Maximum 500 pages.
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Page number for pagination. Defaults to 1. Max 500.
          example: 1
      responses:
        '200':
          description: List of popular movies with pagination info
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/MovieSummary'
                  pagination:
                    $ref: '#/components/schemas/PaginationInfo'
              example:
                results:
                  - id: 27205
                    title: 'Inception'
                    synopsis: 'A thief who steals corporate secrets through dream-sharing technology.'
                    releaseDate: '2010-07-16'
                    posterUrl: 'https://image.tmdb.org/t/p/original/9gk7adHYeDvHkCSEqAvQNLV5Uge.jpg'
                pagination:
                  page: 1
                  totalResults: 10000
                  totalPages: 500
        '400':
          description: Invalid query parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidPage:
                  summary: Invalid Page
                  value:
                    error: 'Parameter "page" must be a positive integer from 1 to 500'
        '500':
          description: API key is not configured or TMDB error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingApiKey:
                  summary: Missing API Key
                  value:
                    error: API key is not configured
        '502':
          description: Failed to reach service
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                serviceDown:
                  summary: Service Unavailable
                  value:
                    error: Failed to reach service

  # ── TV Series ─────────────────────────────────────────────────

  /v1/tv/search:
    get:
      tags: [TV Series]
      summary: Search TV series by title
      description: |
        Searches for TV series matching the given title. Results are transformed
        into a simplified `TvSeriesSummary` shape with pagination.
      parameters:
        - name: title
          in: query
          required: true
          schema:
            type: string
          description: TV series title to search for
          example: Breaking Bad
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Page number for pagination. Defaults to 1.
          example: 1
      responses:
        '200':
          description: List of matching TV series
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/TvSeriesSummary'
                  pagination:
                    $ref: '#/components/schemas/PaginationInfo'
              example:
                results:
                  - id: 1396
                    title: 'Breaking Bad'
                    synopsis: 'A chemistry teacher diagnosed with cancer turns to manufacturing drugs.'
                    airDate: '2008-01-20'
                    posterUrl: 'https://image.tmdb.org/t/p/original/ggFHVNu6YYI5L9pCfOacjizRGt.jpg'
                pagination:
                  page: 1
                  totalResults: 5
                  totalPages: 1
        '400':
          description: Missing or invalid query parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingTitle:
                  summary: Missing title
                  value:
                    error: 'Parameter "title" is required (query param)'
        '500':
          description: API key is not configured or other server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingApiKey:
                  summary: Missing API Key
                  value:
                    error: API key is not configured
        '502':
          description: Failed to reach service
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                serviceDown:
                  summary: Service Unavailable
                  value:
                    error: Failed to reach service

  /v1/tv/details/{id}:
    get:
      tags: [TV Series]
      summary: Get TV series details
      description: |
        Returns detailed information for a single TV series identified by its ID.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
          description: TV series ID (must be a positive integer)
          example: 1396
      responses:
        '200':
          description: TV series details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TvSeriesSummary'
        '400':
          description: Missing or invalid ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingId:
                  summary: Missing ID
                  value:
                    error: 'Parameter "id" is required'
                invalidId:
                  summary: Non-numeric ID
                  value:
                    error: 'Parameter "id" must be a positive integer'
        '500':
          description: API key is not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingApiKey:
                  summary: Missing API Key
                  value:
                    error: API key is not configured
        '502':
          description: Failed to reach service
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                serviceDown:
                  summary: Service Unavailable
                  value:
                    error: Failed to reach service

  /v1/tv/popular:
    get:
      tags: [TV Series]
      summary: Get popular TV series
      description: |
        Returns the current list of popular TV series, transformed into simplified `TvSeriesSummary` objects with pagination info. Maximum 500 pages.
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Page number for pagination. Defaults to 1. Max 500 pages.
          example: 1
      responses:
        '200':
          description: List of popular TV series
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/TvSeriesSummary'
                  pagination:
                    $ref: '#/components/schemas/PaginationInfo'
              example:
                results:
                  - id: 1396
                    title: 'Breaking Bad'
                    synopsis: 'A chemistry teacher diagnosed with cancer turns to manufacturing drugs.'
                    airDate: '2008-01-20'
                    posterUrl: 'https://image.tmdb.org/t/p/original/ggFHVNu6YYI5L9pCfOacjizRGt.jpg'
                pagination:
                  page: 1
                  totalResults: 10000
                  totalPages: 500
        '400':
          description: Invalid query parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidPage:
                  summary: Invalid Page
                  value:
                    error: 'Parameter "page" must be a positive integer from 1 to 500'
        '500':
          description: API key is not configured or other server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingApiKey:
                  summary: Missing API Key
                  value:
                    error: API key is not configured
        '502':
          description: Failed to reach service
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                serviceDown:
                  summary: Service Unavailable
                  value:
                    error: Failed to reach service

  # ── Reviews ──────────────────────────────────────────────────

  /v1/reviews:
    get:
      tags: [Reviews]
      summary: List reviews for a movie or TV title
      description: |
        Public, paginated list of reviews for a given media id and type.
        Returns `200` with an empty `data` array when no reviews exist
        (does not 404 — an unreviewed title is not an error).
      parameters:
        - {
            in: query,
            name: mediaId,
            required: true,
            schema: { type: integer, minimum: 1 },
            example: 550,
          }
        - {
            in: query,
            name: mediaType,
            required: true,
            schema: { type: string, enum: [movie, tv] },
          }
        - { in: query, name: page, schema: { type: integer, minimum: 1, default: 1 } }
        - {
            in: query,
            name: limit,
            schema: { type: integer, minimum: 1, maximum: 100, default: 25 },
          }
        - {
            in: query,
            name: sort,
            schema: { type: string, enum: [createdAt, id], default: createdAt },
          }
        - { in: query, name: order, schema: { type: string, enum: [asc, desc], default: desc } }
      responses:
        '200':
          description: Paginated list of reviews
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PaginatedReviews' }
        '400':
          description: Validation failed (missing/invalid query params)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '500':
          description: Database error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

    post:
      tags: [Reviews]
      summary: Create a review
      description: |
        Create a review for a movie or TV show. A user can only create one review per title.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mediaId, mediaType, body]
              properties:
                mediaId:
                  type: integer
                  minimum: 1
                  example: 550
                mediaType:
                  type: string
                  enum: [movie, tv]
                  example: movie
                title:
                  type: string
                  nullable: true
                  example: Loved it
                body:
                  type: string
                  minLength: 1
                  example: A modern classic that holds up after multiple viewings.
      responses:
        '201':
          description: Review created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Review' }
        '400':
          description: Validation failed or user not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              example:
                error: Missing or malformed Authorization header
        '409':
          description: User has already reviewed this title
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              example:
                error: User has already reviewed this title
        '500':
          description: Database error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /v1/reviews/me:
    get:
      tags: [Reviews]
      summary: List the authenticated caller's reviews
      description: |
        Returns reviews authored by the caller, identified by the JWT `sub`
        claim. Any client-supplied `userId` query parameter is ignored —
        identity is taken only from the verified token.

        Each review is enriched with either a `movieSummary` or `tvSeriesSummary`
        field containing that title's metadata, depending on the mediaType, or `null`
        if no metadata exists. Each item also includes an `author` object.

      security:
        - bearerAuth: []
      parameters:
        - { in: query, name: page, schema: { type: integer, minimum: 1, default: 1 } }
        - {
            in: query,
            name: limit,
            schema: { type: integer, minimum: 1, maximum: 100, default: 25 },
          }
        - {
            in: query,
            name: sort,
            schema: { type: string, enum: [createdAt, id], default: createdAt },
          }
        - { in: query, name: order, schema: { type: string, enum: [asc, desc], default: desc } }
      responses:
        '200':
          description: Paginated list of the caller's reviews, enriched with metadata
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      oneOf:
                        - type: object
                          properties:
                            movieSummary:
                              allOf:
                                - $ref: '#/components/schemas/MovieSummary'
                              nullable: true
                        - type: object
                          properties:
                            tvSeriesSummary:
                              allOf:
                                - $ref: '#/components/schemas/TvSeriesSummary'
                              nullable: true
                  pagination:
                    type: object
                    properties:
                      page: { type: integer, example: 1 }
                      limit: { type: integer, example: 25 }
                      total: { type: integer, example: 53 }
                      totalPages: { type: integer, example: 3 }
              examples:
                movieReview:
                  summary: Movie review
                  value:
                    data:
                      - id: 1
                        mediaId: 550
                        mediaType: movie
                        title: 'Loved it'
                        body: 'A modern classic'
                        createdAt: '2024-01-01T00:00:00.000Z'
                        updatedAt: '2024-01-01T00:00:00.000Z'
                        author:
                          id: 42
                          subjectId: 'auth2|abc123'
                          displayName: 'alice'
                        movieSummary:
                          id: 550
                          title: 'Fight Club'
                          synopsis: 'A ticking-time-bomb insomniac and a slippery soap salesman channel primal male aggression into a shocking new form of therapy.'
                          releaseDate: '1999-10-15'
                          posterUrl: 'https://image.tmdb.org/t/p/original/pB8BM7pdSp6B6Ih7QZ4DrQ3PmJK.jpg'
                tvReview:
                  summary: TV series review
                  value:
                    data:
                      - id: 2
                        mediaId: 1396
                        mediaType: tv
                        title: 'Masterpiece'
                        body: 'One of the best shows ever made.'
                        createdAt: '2024-01-02T00:00:00.000Z'
                        updatedAt: '2024-01-02T00:00:00.000Z'
                        author:
                          id: 42
                          subjectId: 'auth2|abc123'
                          displayName: 'alice'
                        tvSeriesSummary:
                          id: 1396
                          title: 'Breaking Bad'
                          synopsis: "A high school chemistry teacher diagnosed with inoperable lung cancer turns to manufacturing and selling methamphetamine in order to secure his family's future."
                          airDate: '2008-01-20'
                          posterUrl: 'https://image.tmdb.org/t/p/original/ggFHVNu6YYI5L9pCfOacjizRGt.jpg'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/InternalError' }

  /v1/reviews/{id}:
    get:
      tags: [Reviews]
      summary: Get a single review by ID
      description: Return a single review by its database ID.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, minimum: 1 }
          example: 1
      responses:
        '200':
          description: Single review
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Review' }
        '400':
          description: Invalid ID
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              example:
                error: Parameter "id" must be a positive integer
        '404':
          description: Review not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              example:
                error: Review not found
        '500':
          description: Database error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

    put:
      tags: [Reviews]
      summary: Update a review body
      description: |
        Update a review.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, minimum: 1 }
          example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [body]
              properties:
                title:
                  type: string
                  nullable: true
                  example: An even better title
                body:
                  type: string
                  minLength: 1
                  example: Updated review text.
      responses:
        '200':
          description: Updated review
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Review' }
        '400':
          description: Validation failed or review not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              example:
                error: Missing or malformed Authorization header
        '403':
          description: Forbidden — not the author
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              example:
                error: Forbidden
        '500':
          description: Database error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

    delete:
      tags: [Reviews]
      summary: Delete a review
      description: |
        Delete a review.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, minimum: 1 }
          example: 1
      responses:
        '200':
          description: Successfully deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Successfully deleted
        '400':
          description: Invalid ID or review not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              example:
                error: Missing or malformed Authorization header
        '403':
          description: Forbidden — not the author or admin
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              example:
                error: Forbidden
        '500':
          description: Database error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  # ── Ratings ──────────────────────────────────────────────────

  /v1/ratings:
    get:
      tags: [Ratings]
      summary: Aggregate rating summary for a movie or TV title
      description: |
        Return the average score and total rating count for a movie or TV series.
      parameters:
        - {
            in: query,
            name: mediaId,
            required: true,
            schema: { type: integer, minimum: 1 },
            example: 550,
          }
        - {
            in: query,
            name: mediaType,
            required: true,
            schema: { type: string, enum: [movie, tv] },
          }
      responses:
        '200':
          description: Aggregate rating summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/RatingSummary' }
        '400':
          description: Validation failed (missing/invalid query params)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '500':
          description: Database error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

    post:
      tags: [Ratings]
      summary: Submit a rating
      description: |
        Submit a numeric score for a movie or TV show.
        Only one rating per user per title is allowed.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mediaId, mediaType, score]
              properties:
                mediaId:
                  type: integer
                  minimum: 1
                  example: 550
                mediaType:
                  type: string
                  enum: [movie, tv]
                  example: movie
                score:
                  type: number
                  format: float
                  minimum: 1
                  maximum: 10
                  example: 8.5
      responses:
        '201':
          description: Rating created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Rating' }
        '400':
          description: Validation failed or user not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
