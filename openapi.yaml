                  summary: Movie rating
                  value:
                    data:
                      - id: 1
                        mediaId: 550
                        mediaType: movie
                        score: 8.5
                        createdAt: '2024-01-01T00:00:00.000Z'
                        updatedAt: '2024-01-01T00:00:00.000Z'
                        author:
                          id: 42
                          subjectId: 'auth2|abc123'
                          displayName: 'alice'
                        movieSummary:
                          id: 550
                          title: 'Fight Club'
                          synopsis: 'A ticking-time-bomb insomniac and a slippery soap salesman channel primal male aggression into a shocking new form of therapy.'
                          releaseDate: '1999-10-15'
                          posterUrl: 'https://image.tmdb.org/t/p/original/pB8BM7pdSp6B6Ih7QZ4DrQ3PmJK.jpg'
                tvRating:
                  summary: TV series rating
                  value:
                    data:
