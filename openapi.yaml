        '500':
          description: Database error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /v1/ratings/me:
    get:
      tags: [Ratings]
      summary: Authenticated caller's rating history with title metadata
      description: |
        Returns ratings submitted by the caller, identified by the JWT `sub`
        claim. Any client-supplied `userId` query parameter is ignored.

        Each rating is enriched with either a `movieSummary` or `tvSeriesSummary`
        field containing that title's metadata, depending on the mediaType, or `null`
        if no metadata exists. Each item also includes an `author` object.

      security:
        - bearerAuth: []
      parameters:
        - { in: query, name: page, schema: { type: integer, minimum: 1, default: 1 } }
        - {
            in: query,
            name: limit,
            schema: { type: integer, minimum: 1, maximum: 100, default: 20 },
          }
        - {
            in: query,
            name: sort,
            schema: { type: string, enum: [createdAt, score], default: createdAt },
          }
        - { in: query, name: order, schema: { type: string, enum: [asc, desc], default: desc } }
      responses:
        '200':
          description: Paginated rating history enriched with title metadata and author
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      oneOf:
                        - type: object
                          properties:
                            movieSummary:
                              allOf:
                                - $ref: '#/components/schemas/MovieSummary'
